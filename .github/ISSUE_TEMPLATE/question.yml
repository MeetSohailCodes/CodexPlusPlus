name: Usage Question
description: Questions about usage, configuration meanings, whether a scenario is supported, etc.
title: "[Question]: "
body:
  - type: textarea
    id: question
    attributes:
      label: Your Question
      placeholder: Which file will this option be written to?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Related Scope
      options:
        - Provider Management
        - Protocol Conversion
        - MCP / skills / plugins
        - Model List
        - Startup / Session Repair
        - UI / Interaction
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you tried
      placeholder: I have tried...

