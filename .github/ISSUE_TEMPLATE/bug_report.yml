name: Bug Report
description: Program crash, errors, configuration write exceptions, unexpected behavior.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Please provide reproducible information as much as possible. Sanitize API Key, Token, account, Base URL if involved.
  - type: dropdown
    id: area
    attributes:
      label: Scope
      options:
        - Start / Restart Codex++
        - Provider Switch / Config Write
        - Protocol Conversion / Proxy
        - MCP / skills / plugins
        - Model List / model_catalog_json
        - UI / Interaction
        - Build / Install
        - Other
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: What actually happened? If there is an error, please paste the full error text.
      placeholder: After clicking restart, Codex++ does not start, latest-status.json shows...
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      placeholder: Should sync current provider config and start Codex.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open...
        2. Select...
        3. Click...
        4. See...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Config Snippets
      description: Please delete or replace sensitive info like API Key, Token, account.
      render: shell
  - type: input
    id: version
    attributes:
      label: Codex++ Version
      placeholder: e.g. 1.1.8
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have sanitized sensitive info such as API Key, Token, account.
          required: true
        - label: I have confirmed this issue still exists in the latest version.
          required: false

