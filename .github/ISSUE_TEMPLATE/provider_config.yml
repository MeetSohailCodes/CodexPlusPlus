name: Provider / Config Issue
description: Issues related to providers, Base URL, API Key, protocol, config.toml, auth.json.
title: "[Config]: "
body:
  - type: markdown
    attributes:
      value: |
        This template is for troubleshooting provider switching, pure API, mixed API Key, protocol conversion, config.toml / auth.json write issues. Please sanitize sensitive info.
  - type: dropdown
    id: relay_mode
    attributes:
      label: Access Mode
      options:
        - Pure API
        - Official Login
        - Official Login + Mixed API Key
        - Unsure
    validations:
      required: true
  - type: dropdown
    id: protocol
    attributes:
      label: Upstream Protocol
      options:
        - Responses API
        - Chat Completions
        - Unsure
    validations:
      required: true
  - type: input
    id: base_url
    attributes:
      label: Base URL
      description: Domain name is sufficient, sanitize sensitive paths.
      placeholder: https://example.com/v1
  - type: textarea
    id: config
    attributes:
      label: Relevant config.toml / auth.json snippets
      description: Please delete sensitive info such as API Key, Token, account.
      render: toml
  - type: textarea
    id: behavior
    attributes:
      label: Problem Description
      placeholder: After switching provider, model_provider is changed to...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Status Files
      description: You can paste latest-status.json or error messages.
      render: json
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have sanitized sensitive info such as API Key, Token, account.
          required: true

