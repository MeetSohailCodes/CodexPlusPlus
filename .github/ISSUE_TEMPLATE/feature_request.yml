name: Feature Request
description: New features, interaction improvements, automation capabilities, configuration enhancements.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: The scenario or pain point you encountered
      placeholder: I often need to switch between multiple providers, but...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to add
      placeholder: I would like to add a...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Feature Scope
      options:
        - Provider Management
        - Protocol Conversion
        - MCP / skills / plugins
        - Model List
        - Startup / Session Repair
        - UI / Interaction
        - Build / Release
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Current workaround
      placeholder: Currently can only manually edit config.toml...
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I confirm this cannot be done with existing features.
          required: false

